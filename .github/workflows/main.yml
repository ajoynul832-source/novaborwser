name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Android SDK (cmdline-tools + packages)
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}"
          cd "${ANDROID_SDK_ROOT}"
          # download command line tools
          curl -sSfL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q cmdline-tools.zip -d cmdline-tools-temp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/
          rm -f cmdline-tools.zip
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          yes | sdkmanager --licenses || true
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"
        shell: bash

      - name: Add Android SDK to PATH
        run: |
          echo "${{ env.ANDROID_SDK_ROOT }}/platform-tools" >> $GITHUB_PATH
          echo "${{ env.ANDROID_SDK_ROOT }}/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Gradle 8.5
        run: |
          curl -sSfL -o gradle-8.5-bin.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip -d gradle
          echo "${{ github.workspace }}/gradle/gradle-8.5/bin" >> $GITHUB_PATH
          gradle --version

      - name: (Optional) regenerate wrapper with Gradle 8.5
        run: |
          gradle wrapper --gradle-version 8.5 --no-daemon || true
          ls -la gradle/wrapper || true

      - name: Build APK (use gradle wrapper if present, else gradle)
        run: |
          if [ -x ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --no-daemon --stacktrace --warning-mode all
          else
            gradle clean assembleDebug --no-daemon --stacktrace --warning-mode all
          fi
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/**/*.apk

      - name: Upload problems report (if present)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report
          path: build/reports/problems/**
