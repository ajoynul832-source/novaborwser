name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          curl -sSfL -o gradle-8.5-bin.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip -d gradle
          echo "${{ github.workspace }}/gradle/gradle-8.5/bin" >> $GITHUB_PATH
          gradle --version

      - name: (Optional) regenerate wrapper with Gradle 8.5
        run: |
          gradle wrapper --gradle-version 8.5 --no-daemon || true
          ls -la gradle/wrapper || true

      - name: Build APK (use gradle wrapper if present, else gradle)
        run: |
          if [ -x ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --no-daemon --stacktrace --warning-mode all
          else
            gradle clean assembleDebug --no-daemon --stacktrace --warning-mode all
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/**/*.apk

      - name: Upload problems report (if present)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report
          path: build/reports/problems/**
